<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener Tester</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

    <h2>Azure Function URL shortener — test page</h2>
    <p>Enter the long URL to shorten:</p>

    <input type="url" id="longUrl" placeholder="https://example.com/very-long-page-address" required>
    <p>Optional - your own short code (letters, digits, underscore, hyphen):</p>
    <input type="text" id="customCode" placeholder="e.g. google (leave empty for auto)" autocomplete="off">
    <button onclick="shortenUrl()">Shorten URL</button>

    <div id="result"></div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value.trim();
            const customRaw = document.getElementById('customCode').value.trim();
            const resultDiv = document.getElementById('result');
            const apiUrl = 'https://urlshortnerfunctionapp20260416202904-fwevcfctdaged5g0.germanywestcentral-01.azurewebsites.net/api/shorten';

            if (!longUrl) {
                alert("Please enter a URL.");
                return;
            }

            const body = { url: longUrl };
            if (customRaw) {
                body.customCode = customRaw;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const text = await response.text();
                if (response.ok) {
                    resultDiv.className = 'success is-visible';
                    resultDiv.innerHTML = `Done. Short link: <a href="${text}" target="_blank">${text}</a>`;
                } else {
                    resultDiv.className = 'error is-visible';
                    resultDiv.innerText = `Error ${response.status}: ${text || response.statusText}`;
                }
            } catch (error) {
                resultDiv.className = 'error is-visible';
                resultDiv.innerText = "Error: " + error.message + ". Check that the function is running and CORS allows this origin.";
            }
        }
    </script>
</body>
</html>
