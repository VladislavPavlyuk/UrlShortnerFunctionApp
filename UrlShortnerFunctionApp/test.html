<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener Tester</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

            button:hover {
                background-color: #005a9e;
            }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        .success {
            background-color: #dff6dd;
            color: #107c10;
            border: 1px solid #107c10;
        }

        .error {
            background-color: #fde7e9;
            color: #a4262c;
            border: 1px solid #a4262c;
        }

        a {
            color: #0078d4;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Тестирование Azure Function Shortener</h2>
    <p>Введите длинный URL для сокращения:</p>

    <input type="url" id="longUrl" placeholder="https://example.com/very-long-page-address" required>
    <button onclick="shortenUrl()">Сократить ссылку</button>

    <div id="result"></div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            const resultDiv = document.getElementById('result');
            const apiUrl = 'https://urlshortnerfunctionapp20260416202904-fwevcfctdaged5g0.germanywestcentral-01.azurewebsites.net/api/shorten';

            if (!longUrl) {
                alert("Пожалуйста, введите URL");
                return;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: longUrl, // Твоя функция читает ReadAsStringAsync() напрямую
                    headers: {
                        'Content-Type': 'text/plain'
                    }
                });

                if (response.ok) {
                    const shortUrl = await response.text();
                    resultDiv.className = 'success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `Готово! Короткая ссылка: <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
                } else {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerText = "Ошибка: " + error.message + ". Убедитесь, что Azure Function запущена и CORS разрешен.";
            }
        }
    </script>
</body>
</html>
